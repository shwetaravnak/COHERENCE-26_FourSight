<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ClinMatch AI — Register</title>
  <link rel="stylesheet" href="css/styles.css">
  <style>
    .cond-field       { display:none; }
    .cond-field.show  { display:block; animation:fadeIn .3s ease; }
  </style>
</head>
<body>

  <div class="auth-wrap">
    <div class="auth-card" style="max-width:520px;">

      <div class="auth-logo">ClinMatch AI</div>
      <h2 style="text-align:center; font-size:22px; margin:8px 0 24px;">Create Your Account</h2>

      <!-- ROLE TABS -->
      <div class="role-tabs">
        <div class="role-tab active"      onclick="switchRegTab(this,'patient')">Patient</div>
        <div class="role-tab"             onclick="switchRegTab(this,'researcher')">Researcher</div>
        <div class="role-tab"             onclick="switchRegTab(this,'admin')">Admin</div>
      </div>

      <!-- FORM -->
      <div class="form-group">
        <label>Full Name</label>
        <input type="text" class="input-field" placeholder="Your full name">
      </div>
      <div class="form-group">
        <label>Email address</label>
        <input type="email" class="input-field" placeholder="you@example.com">
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" class="input-field" placeholder="Create a password" oninput="checkStrength(this)">
        <div class="strength-bar"><div class="strength-fill" id="strengthFill"></div></div>
      </div>
      <div class="form-group">
        <label>Confirm Password</label>
        <input type="password" class="input-field" placeholder="Repeat password">
      </div>

      <!-- Conditional: Researcher only -->
      <div class="form-group cond-field" id="instField">
        <label>Institution Name</label>
        <input type="text" class="input-field" placeholder="e.g. AIIMS Mumbai, Tata Memorial">
        <div class="input-helper">Your affiliated research institution</div>
      </div>

      <button class="btn btn-primary btn-full" style="padding:13px; margin-bottom:12px;">
        Create Account
      </button>

      <div class="auth-footer">Already have an account? <a href="login.html">Login</a></div>
      <div style="text-align:center; color:var(--muted); font-size:11px; margin-top:16px;">
        Your personal data is anonymized and protected
      </div>

    </div>
  </div>

  <script src="js/main.js"></script>
</body>
</html>
