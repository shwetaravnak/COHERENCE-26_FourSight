<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ClinMatch AI — Activity Logs</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

  <!-- NAV -->
  <nav class="dash-nav">
    <div class="dash-nav-inner">
      <div style="display:flex; align-items:center; gap:32px;">
        <button class="back-link" onclick="handleBackClick()" style="margin-bottom:0;">← Back</button>
        <div class="lp-logo" onclick="goHome()" style="cursor:pointer;">ClinMatch AI</div>
        <div class="dash-links">
          <a href="admin-dashboard.html">Dashboard</a>
          <a href="admin-researchers.html">Researchers</a>
          <a href="admin-trials.html">Trials</a>
          <a href="admin-reports.html">Reports</a>
          <a href="admin-logs.html" class="active">Activity Logs</a>
        </div>
      </div>
      <div class="dash-right">
        <span class="nav-user-display" id="navUserDisplay">Welcome, Admin</span>
        <div class="nav-profile-wrap">
          <button class="nav-profile-btn" id="navProfileBtn" title="Profile" onclick="toggleProfileMenu(event)">
            <span id="navProfileInitials">A</span>
          </button>
          <div class="nav-profile-dropdown" id="navProfileDropdown">
            <button type="button" onclick="logout()">Log out</button>
          </div>
        </div>
      </div>
    </div>
  </nav>

  <div style="max-width:1000px; margin:0 auto; padding:36px 32px;">

    <!-- HEADER -->
    <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:28px; flex-wrap:wrap; gap:12px;">
      <h1 style="font-size:26px;">Platform Activity Logs</h1>
      <div>
        <span class="text-muted" style="margin-right:12px; font-size:13px;">Live view of all system activity</span>
        <button class="btn btn-ghost btn-sm" onclick="loadAdminLogs()">🔄 Refresh</button>
      </div>
    </div>

    <!-- LOGS CONTAINER -->
    <div class="card" style="padding:24px;">
      <div id="adminLogsContainer" style="display:flex; flex-direction:column; gap:16px;">
        <p class="text-muted" style="text-align:center; padding:40px;">Loading logs...</p>
      </div>
    </div>

  </div>

  <script src="js/main.js"></script>
</body>
</html>
