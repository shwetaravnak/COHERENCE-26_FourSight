<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ClinMatch AI — Researcher Dashboard</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

  <!-- NAV -->
  <nav class="dash-nav">
    <div class="dash-nav-inner">
      <div style="display:flex; align-items:center; gap:32px;">
        <button class="back-link" onclick="handleBackClick()" style="margin-bottom:0;">← Back</button>
        <div class="lp-logo" onclick="goHome()" style="cursor:pointer;">ClinMatch AI</div>
        <div class="dash-links">
          <a href="researcher-dashboard.html" class="active">Dashboard</a>
          <a href="researcher-trial.html">My Trials</a>
          <a href="researcher-inquiry.html">Inquiries</a>
        </div>
      </div>
      <div class="dash-right">
        <button class="notif-btn">🔔<span class="notif-badge">3</span></button>
        <span class="nav-user-display" id="navUserDisplay">—</span>
        <div class="nav-profile-wrap">
          <button class="nav-profile-btn" id="navProfileBtn" title="Profile" onclick="toggleProfileMenu(event)">
            <span id="navProfileInitials">R</span>
          </button>
          <div class="nav-profile-dropdown" id="navProfileDropdown">
            <button type="button" onclick="logout()">Log out</button>
          </div>
        </div>
      </div>
    </div>
  </nav>

  <!-- CONTENT -->
  <div style="max-width:1200px; margin:0 auto; padding:36px 32px;">

    <h1 style="font-size:26px; margin-bottom:4px;" id="welcomeHeading">Welcome back</h1>
    <p class="text-muted page-subtitle" id="researcherSubtitle">Researcher Portal</p>

    <!-- STATS -->
    <div class="dash-stats">
      <div class="stat-card"><div class="stat-val text-teal" id="rstat-trials">0</div><div class="stat-lbl">My Trials</div></div>
      <div class="stat-card"><div class="stat-val" id="rstat-matches">0</div><div class="stat-lbl">Total Matches</div></div>
      <div class="stat-card"><div class="stat-val" style="color:var(--warning);" id="rstat-inquiries">0</div><div class="stat-lbl">New Inquiries</div></div>
      <div class="stat-card"><div class="stat-val text-success" id="rstat-accepted">0</div><div class="stat-lbl">Accepted</div></div>
    </div>

    <!-- QUICK ACTIONS -->
    <div class="quick-actions">
      <button class="btn btn-ghost btn-sm">📊 View Reports</button>
      <a href="researcher-trial.html" class="btn btn-ghost btn-sm">🔔 View Inquiries</a>
      <a href="admin-add-trial.html" class="btn btn-primary btn-sm">+ New Trial</a>
    </div>

    <!-- TWO COLUMN -->
    <div class="two-col">

      <!-- LEFT: My Trials -->
      <div class="trial-list-card">
        <div class="trial-list-header">
          <h3>My Clinical Trials</h3>
          <a href="researcher-trial.html" class="text-teal" style="font-size:13px;">View All →</a>
        </div>
        <div id="researcherTrialsList">
          <div class="text-muted" style="padding:24px 20px; font-size:13px;">No trials yet. Start by adding a new trial.</div>
        </div>
      </div>

      <!-- RIGHT: Activity Feed -->
      <div class="activity-card">
        <div style="padding:18px 20px; border-bottom:1px solid var(--border);">
          <h3 style="font-family:'Syne',sans-serif; font-size:15px;">Recent Activity</h3>
        </div>
        <div id="researcherActivityFeed">
          <div class="text-muted" style="padding:20px; font-size:13px;">No recent activity.</div>
        </div>
      </div>

    </div>
  </div>

  <script src="js/main.js"></script>
</body>
</html>
